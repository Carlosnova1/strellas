name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$(pwd)/android-ndk-r25c" >> $GITHUB_ENV
      
      - name: Install ebitenmobile
        run: go install github.com/hajimehoshi/ebiten/v2/cmd/ebitenmobile@latest
      
      - name: Build APK
        working-directory: mobile
        run: ebitenmobile bind -target android -javapkg com.carlosnova.strellas -o ../strellas.apk .
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: strellas-android
          path: strellas.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: strellas.apk
          generate_release_notes: true
